<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>workout-flow</title>
<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700&display=swap" rel="stylesheet">
<style>
:root,[data-theme="light"]{--bg:#f7f6f2;--surface:#fbfaf7;--surface2:#f2efea;--text:#25231d;--muted:#76736c;--border:#d9d5cd;--primary:#01696f;--danger:#a12c7b;--shadow:0 10px 30px rgba(32,29,24,.08);--radius:18px;--radius2:24px}
[data-theme="dark"]{--bg:#141312;--surface:#1b1a18;--surface2:#211f1d;--text:#e7e4df;--muted:#8a857d;--border:#2e2c29;--primary:#4f98a3;--danger:#d163a7;--shadow:0 12px 34px rgba(0,0,0,.35)}
*{box-sizing:border-box}html,body{margin:0}body{font-family:'Satoshi',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}button,input,select,textarea{font:inherit}button{border:0;background:none;color:inherit} .app{max-width:1100px;margin:0 auto;padding:16px} .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px} .brand{display:flex;align-items:center;gap:10px;font-weight:700} .mark{width:34px;height:34px;border-radius:12px;background:var(--primary);box-shadow:var(--shadow)} .toggle{padding:10px 12px;border-radius:999px;background:var(--surface);border:1px solid var(--border);cursor:pointer} .grid{display:grid;grid-template-columns:1fr;gap:16px} @media(min-width:900px){.grid.desktop{grid-template-columns:380px 1fr}} .panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);box-shadow:var(--shadow);overflow:hidden} .panel h2,.panel h3{margin:0} .panelHead{padding:18px 18px 0} .panelBody{padding:18px} .row{display:flex;gap:10px;flex-wrap:wrap} .chip{padding:8px 12px;border-radius:999px;background:var(--surface2);border:1px solid var(--border);cursor:pointer} .chip.active{background:var(--primary);color:#fff;border-color:transparent} .list{display:grid;gap:10px;margin-top:14px} .exerciseItem{padding:14px;border-radius:16px;background:var(--surface2);border:1px solid transparent;cursor:pointer} .exerciseItem.active{border-color:var(--primary)} .muted{color:var(--muted);font-size:.92rem} .field{display:grid;gap:6px;margin-bottom:12px} label{font-size:.9rem;color:var(--muted)} input,select,textarea{width:100%;padding:12px 14px;border-radius:14px;border:1px solid var(--border);background:var(--bg);color:var(--text)} textarea{min-height:84px;resize:vertical} .btn{padding:12px 14px;border-radius:14px;cursor:pointer;font-weight:600} .btnPrimary{background:var(--primary);color:#fff} .btnGhost{background:var(--surface2);border:1px solid var(--border)} .btnDanger{background:var(--danger);color:#fff} .timer{font-size:clamp(2.2rem,8vw,4rem);font-weight:700;letter-spacing:-.04em} .workoutCard{padding:18px;border-radius:22px;background:linear-gradient(180deg,var(--surface),var(--surface2));border:1px solid var(--border)} .stack{display:grid;gap:10px} .kv{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)} .kv:last-child{border-bottom:0} .tiny{font-size:.82rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)} .modal{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center;padding:12px;overflow:auto} .modal.open{display:flex} .modalCard{width:min(560px,100%);max-height:88vh;display:flex;flex-direction:column;background:var(--bg);border:1px solid var(--border);border-radius:24px;box-shadow:var(--shadow);overflow:hidden} .modalHead{display:flex;justify-content:space-between;align-items:center;padding:16px 16px 0;flex-shrink:0} .modalBody{padding:16px;overflow:auto;-webkit-overflow-scrolling:touch} .modalActions{display:flex;gap:10px;justify-content:flex-end;padding:0 16px 16px;flex-wrap:wrap;flex-shrink:0} .empty{padding:18px;color:var(--muted)} .sticky{position:sticky;top:12px} .progress{height:10px;border-radius:999px;background:var(--border);overflow:hidden} .bar{height:100%;background:var(--primary);width:0%} .hint{font-size:.92rem;color:var(--muted)}
</style>
</head>
<body>
<div id="app"></div>
<script>
const LS='workout_flow_v2';
const state={theme:(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'),screen:'setup',currentDay:0,editing:null,remaining:0,timer:0,interval:null,workout:null,config:null,drag:null};
const sample=()=>({days:[{name:'Giorno 1',exercises:[{name:'Panca piana',sets:4,reps:8,rest:90,weight:80,weights:[80,80,80,80],weightMode:'fixed',notes:''},{name:'Croci manubri',sets:3,reps:12,rest:60,weight:16,weights:[16,16,14],weightMode:'variable',notes:''}]},{name:'Giorno 2',exercises:[{name:'Trazioni',sets:4,reps:8,rest:120,weight:0,weights:[0,0,0,0],weightMode:'fixed',notes:'libere'},{name:'Rematore',sets:4,reps:10,rest:90,weight:70,weights:[70,70,72.5,72.5],weightMode:'variable',notes:''}]},{name:'Giorno 3',exercises:[{name:'Squat',sets:5,reps:5,rest:150,weight:100,weights:[100,100,102.5,102.5,100],weightMode:'variable',notes:''}]}]});
function load(){try{const d=JSON.parse(localStorage.getItem(LS));if(d)Object.assign(state,d)}catch(e){} if(!state.config)state.config=sample()}
function save(){localStorage.setItem(LS,JSON.stringify({theme:state.theme,screen:state.screen,currentDay:state.currentDay,config:state.config,workout:state.workout}))}
function setTheme(t){state.theme=t;document.documentElement.setAttribute('data-theme',t);save();render()}
function qs(id){return document.getElementById(id)}
function ensureWeights(ex){if(!ex.weights||!Array.isArray(ex.weights)||ex.weights.length!==ex.sets){const base=Number(ex.weight||0);ex.weights=Array.from({length:ex.sets},()=>base)}return ex.weights}
function currentExercise(){return state.workout?state.config.days[state.workout.dayIndex].exercises[state.workout.exerciseIndex]:null}
function syncDays(){const n=+qs('daysSelect').value;const days=state.config.days;if(days.length<n){for(let i=days.length;i<n;i++)days.push({name:`Giorno ${i+1}`,exercises:[]})}else if(days.length>n){days.length=n}if(state.currentDay>=n)state.currentDay=0;save();render()}
function addExercise(){state.config.days[state.currentDay].exercises.push({name:'Nuovo esercizio',sets:3,reps:'8',rest:90,weight:0,weights:[0,0,0],notes:''});save();render()}
function openEdit(i){const ex=state.config.days[state.currentDay].exercises[i];state.editing={idx:i,...structuredClone(ex)};render()}
function saveEdit(){const d=state.config.days[state.currentDay].exercises;const sets=Math.max(1,+qs('sets').value||1);const reps=Math.max(1,+qs('reps').value||1);const mode=(document.querySelector('input[name=weightMode]:checked')?.value)||'fixed';let weights=[];if(mode==='variable'){weights=Array.from({length:sets},(_,i)=>+qs('seriesWeight_'+i).value||0)}else{const fixed=+qs('fixedWeight').value||0;weights=Array.from({length:sets},()=>fixed)}d[state.editing.idx]={name:qs('name').value||'Esercizio',sets,reps,rest:+qs('rest').value||0,weight:weights[0]||0,weights,weightMode:mode,notes:qs('notes').value||''};state.editing=null;save();render()}
function buildWeightEditor(editing){
  const mode=editing.weightMode||'fixed';
  const sets=Math.max(1,+editing.sets||1);
  const reps=Math.max(1,+editing.reps||1);
  const weights=editing.weights||Array.from({length:sets},()=>editing.weight||0);
  if(mode==='fixed'){return `<div class="field"><label>Gestione peso</label><div class="row"><label class="chip active" style="cursor:pointer"><input type="radio" name="weightMode" value="fixed" checked style="display:none">Peso fisso</label><label class="chip" style="cursor:pointer" onclick="state.editing.weightMode='variable';render()"><input type="radio" name="weightMode" value="variable" style="display:none">Peso variabile</label></div></div><div class="field"><label>Peso fisso (kg)</label><input id="fixedWeight" type="number" step="0.5" value="${weights[0] ?? editing.weight ?? 0}"></div>`;}
  return `<div class="field"><label>Gestione peso</label><div class="row"><label class="chip" style="cursor:pointer" onclick="state.editing.weightMode='fixed';render()"><input type="radio" name="weightMode" value="fixed" style="display:none">Peso fisso</label><label class="chip active" style="cursor:pointer"><input type="radio" name="weightMode" value="variable" checked style="display:none">Peso variabile</label></div></div>${Array.from({length:sets},(_,idx)=>`<div class="field"><label>Serie ${idx+1}</label><input id="seriesWeight_${idx}" type="number" step="0.5" value="${weights[idx] ?? editing.weight ?? 0}"></div>`).join('')}`;
}
function deleteExercise(i){if(confirm('Cancellare questo esercizio?')){state.config.days[state.currentDay].exercises.splice(i,1);state.editing=null;save();render()}}
function duplicateExercise(i){const d=state.config.days[state.currentDay].exercises;d.splice(i+1,0,structuredClone(d[i]));save();render()}
function moveExercise(from,to){const d=state.config.days[state.currentDay].exercises;if(from==null||to<0||to>=d.length||from===to)return;const [item]=d.splice(from,1);d.splice(to,0,item);state.drag=null;save();render()}
function startWorkout(){const day=state.config.days[state.currentDay];if(!day.exercises.length){alert('Aggiungi almeno un esercizio');return}state.workout={dayIndex:state.currentDay,exerciseIndex:0,setIndex:0,history:[],dayName:day.name};state.screen='workout';save();render();window.scrollTo({top:0,behavior:'smooth'})}
function nextStep(){const ex=currentExercise();if(!ex||!state.workout)return;state.workout.setIndex+=1;if(state.workout.setIndex>=ex.sets){state.workout.exerciseIndex+=1;state.workout.setIndex=0}state.screen=(state.workout.exerciseIndex>=state.config.days[state.workout.dayIndex].exercises.length)?'done':'workout';save();render()}
function prevStep(){if(!state.workout)return;const day=state.config.days[state.workout.dayIndex];if(state.workout.setIndex>0){state.workout.setIndex-=1}else if(state.workout.exerciseIndex>0){state.workout.exerciseIndex-=1;const prev=day.exercises[state.workout.exerciseIndex];state.workout.setIndex=Math.max(0,(prev?.sets||1)-1)}state.screen='workout';save();render()}
function finishWorkout(){clearInterval(state.interval);state.interval=null;state.workout={dayIndex:state.currentDay,exerciseIndex:0,setIndex:0,history:[],dayName:state.config.days[state.currentDay].name};state.remaining=0;state.timer=0;state.screen='setup';save();render();window.scrollTo({top:0,behavior:'smooth'})}
function endSet(){const ex=currentExercise();if(!ex||!state.workout)return;const ws=ensureWeights(ex);state.workout.history.push({exercise:ex.name,set:state.workout.setIndex+1,weight:ws[state.workout.setIndex] ?? ex.weight,rest:ex.rest});state.remaining=ex.rest;state.timer=ex.rest;state.screen='timer';clearInterval(state.interval);state.interval=setInterval(()=>{state.remaining-=1;if(state.remaining<=0){clearInterval(state.interval);state.interval=null;nextStep()}render()},1000);save();render();window.scrollTo({top:0,behavior:'smooth'})}
function skipTimer(){clearInterval(state.interval);state.interval=null;nextStep()}
function backToWorkout(){clearInterval(state.interval);state.interval=null;state.screen='workout';save();render()}
function render(){document.documentElement.setAttribute('data-theme',state.theme);const day=state.config.days[state.currentDay];const ex=currentExercise();const isMobile=window.matchMedia('(max-width: 899px)').matches;const setupInner=`<div class="panelHead"><h2>Scheda Allenamento</h2></div><div class="panelBody"><div class="field"><label>Numero giorni allenamento</label><select id="daysSelect" onchange="syncDays()">${[3,4,5,6,7].map(n=>`<option ${state.config.days.length===n?'selected':''}>${n}</option>`).join('')}</select></div><div class="row">${state.config.days.map((d,i)=>`<button class="chip ${i===state.currentDay?'active':''}" onclick="state.currentDay=${i};render();save()">${d.name}</button>`).join('')}</div><div class="list">${day.exercises.map((e,i)=>`<div class="exerciseItem ${state.editing&&state.editing.idx===i?'active':''}" draggable="true" ondragstart="state.drag=${i}" ondragover="event.preventDefault()" ondrop="moveExercise(state.drag,${i})" onclick="openEdit(${i})"><div class="row" style="justify-content:space-between;align-items:flex-start;gap:12px"><div style="flex:1;min-width:0"><strong>${e.name}</strong><div class="muted">${e.sets} serie · ${e.reps} reps · ${e.rest}s recupero · ${e.weight} kg</div><div class="hint">Trascina per riordinare</div></div><button class="btn btnGhost" style="padding:8px 10px" onclick="event.stopPropagation();deleteExercise(${i})">Elimina</button></div></div>`).join('')||'<div class="empty">Nessun esercizio ancora.</div>'}</div><div class="row" style="margin-top:14px"><button class="btn btnGhost" onclick="addExercise()">+ Esercizio</button><button class="btn btnPrimary" onclick="startWorkout()">Avvia allenamento</button></div></div>`;
const workoutInner=state.screen==='timer'?`<div class="panelHead"><h2>Timer</h2><p class="muted">Recupero in corso</p></div><div class="panelBody"><div class="workoutCard"><div class="tiny">Recupero</div><div class="timer">${Math.floor(state.remaining/60)}:${String(state.remaining%60).padStart(2,'0')}</div><div class="progress"><div class="bar" style="width:${state.timer ? (state.remaining/state.timer)*100 : 0}%"></div></div><div class="row" style="margin-top:14px"><button class="btn btnPrimary" style="width:100%" onclick="skipTimer()">Salta Timer</button></div></div></div>`:state.screen==='workout'?`<div class="panelHead"><h2>Allenamento</h2><p class="muted">Avvia il timer con Fine serie</p></div><div class="panelBody"><div class="workoutCard"><div class="tiny">${day.name}</div><h3>${ex?ex.name:'Seleziona un esercizio'}</h3><div class="stack">${ex?(()=>{const ws=ensureWeights(ex);return `<div class="kv"><span>Serie</span><strong>${state.workout.setIndex+1} / ${ex.sets}</strong></div><div class="kv"><span>Ripetizioni</span><strong>${ex.reps}</strong></div><div class="kv"><span>Peso serie attuale</span><strong>${ws[state.workout.setIndex] ?? ex.weight} kg</strong></div><div class="kv"><span>Recupero</span><strong>${ex.rest} s</strong></div><div class="row">${(state.workout.exerciseIndex===0 && state.workout.setIndex===0)?'':`<button class=\"btn btnGhost\" onclick=\"prevStep()\">Indietro</button>`}<button class="btn btnPrimary" onclick="endSet()">Fine serie</button><button class="btn btnGhost" onclick="nextStep()">Avanti</button></div><div class="row" style="justify-content:flex-end"><button class="btn btnDanger" onclick="finishWorkout()">Fine allenamento</button></div><div class="hint">Premi Fine serie solo quando hai concluso la serie corrente.</div>`})():'<div class="empty">Avvia una scheda per iniziare.</div>'}</div></div></div>`:`<div class="panelHead"><h2>Allenamento completato</h2></div><div class="panelBody"><div class="workoutCard"><h3>Allenamento completato</h3><p class="muted">Hai finito il giorno ${day.name}.</p></div></div></section>`;
const left=`<section class="panel">${setupInner}</section>`;
const right=`<section class="panel sticky">${workoutInner}</section>`;
document.getElementById('app').innerHTML=`<div class="app"><div class="topbar"><div class="brand"><div class="mark"></div><div>${state.screen==='setup'?'Scheda Allenamento':state.screen==='timer'?'Timer':'Allenamento'}</div></div><button class="toggle" onclick="setTheme(state.theme==='dark'?'light':'dark')">Tema ${state.theme==='dark'?'☀️':'🌙'}</button></div>${isMobile?`<div class="grid">${state.screen==='setup'?left:state.screen==='workout'||state.screen==='timer'?right:`<div class="panel"><div class="panelHead"><h2>Allenamento completato</h2></div><div class="panelBody"><div class="workoutCard"><h3>Allenamento completato</h3><p class="muted">Hai finito il giorno ${day.name}.</p></div></div></div>`}</div>`:`<div class="grid desktop">${left}${right}</div>`}${state.editing?`<div class="modal open" onclick="if(event.target===this){state.editing=null;render()}"><div class="modalCard"><div class="modalHead"><h3>Modifica esercizio</h3><button class="toggle" onclick="state.editing=null;render()">Chiudi</button></div><div class="modalBody"><div class="field"><label>Nome</label><input id="name" value="${state.editing.name}"></div><div class="field"><label>Serie</label><input id="sets" type="number" min="1" step="1" value="${state.editing.sets}" onchange="state.editing.sets=+this.value||1;render()"></div><div class="field"><label>Ripetizioni</label><input id="reps" type="number" min="1" step="1" value="${state.editing.reps}" onchange="state.editing.reps=+this.value||1;render()"></div><div class="field"><label>Recupero (secondi)</label><input id="rest" type="number" min="0" step="1" value="${state.editing.rest}"></div>${buildWeightEditor(state.editing)}<div class="field"><label>Note</label><textarea id="notes">${state.editing.notes||''}</textarea></div><div class="row" style="margin-top:10px"><button class="btn btnDanger" onclick="deleteExercise(${state.editing.idx})">Cancella esercizio</button><button class="btn btnGhost" onclick="duplicateExercise(${state.editing.idx})">Duplica esercizio</button></div></div><div class="modalActions"><button class="btn btnGhost" onclick="state.editing=null;render()">Annulla</button><button class="btn btnPrimary" onclick="saveEdit()">Salva</button></div></div></div>`:''}</div>`}
load();render();save();
</script>
</body>
</html>
